name: proforma_fatura_app
description: "Mobil proforma fatura projesi."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # API istekleri için
  http: ^1.1.0
  
  # Token ve kullanıcı verilerini kaydetmek için
  shared_preferences: ^2.2.2
  
  # Tarih ve para formatlaması için
  intl: ^0.19.0
  
  # State management için
  provider: ^6.1.1
  
  # Form validasyonu için
  flutter_form_builder: ^9.1.1
  
  # PDF oluşturma için (proforma fatura)
  pdf: ^3.10.7
  
  # Dosya izinleri için
  permission_handler: ^11.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Assets klasörü ekleyelim (logo vs. için)
  assets:
    - assets/images/
    - assets/icons/