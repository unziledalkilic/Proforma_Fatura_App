name: proforma_fatura_app
description: "Mobil proforma fatura projesi."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  
  # Supabase paketleri
  supabase_flutter: ^2.3.0
  flutter_dotenv: ^5.1.0
  
  # API istekleri için (Supabase ile birlikte kullanılabilir)
  http: ^1.1.0
  
  # Token ve kullanıcı verilerini kaydetmek için
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - .env